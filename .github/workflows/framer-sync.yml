name: framer-sync

# data/*.csv → Framer CMS "Content" 컬렉션 자동 동기화 + 게시.
#   - data/ 가 main 에 푸시되면 즉시 동기화 (checkout 으로 캐시 지연 없음)
#   - 매일 KST 05:00 / 08:00(백업) cron — 푸시 트리거 누락 대비 안전망 (멱등이라 중복 무해)
#   - 수동 실행: Actions 탭 ▶ Run workflow
on:
  push:
    branches: [main]
    paths: ["data/**"]
  schedule:
    - cron: "0 20 * * *" # KST 05:00 (UTC 20:00)
    - cron: "0 23 * * *" # KST 08:00 (백업)
  workflow_dispatch: {}

# framer-sync/state 커밋(증분 해시 영속화 + 60일 비활성 중단 방지)에 쓰기 권한 필요
# issues: 실패 알림 이슈 생성용
permissions:
  contents: write
  issues: write

concurrency:
  group: framer-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          # framer-api 는 node >=22 + global WebSocket 필요. Node 20 은 globalThis.WebSocket 이
          # 없어 실제 연결 시 "Gn is not a constructor" 로 실패함(무변경 스킵일 땐 안 드러남).
          node-version: "22"

      - name: Install
        working-directory: framer-sync
        run: npm ci

      - name: Sync Content (lineup.csv → Content)
        working-directory: framer-sync
        env:
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          FRAMER_COLLECTION_NAME: ${{ secrets.FRAMER_COLLECTION_NAME }}
          SOURCE_BASE: ../data # 이 checkout 의 data/ 를 직접 읽음 (raw URL 캐시 지연 회피)
        run: node scripts/content-sync.js

      - name: Sync Ranking (rank.csv → Ranking, 성·연령별 TOP50)
        working-directory: framer-sync
        env:
          FRAMER_PROJECT_URL: ${{ secrets.FRAMER_PROJECT_URL }}
          FRAMER_API_KEY: ${{ secrets.FRAMER_API_KEY }}
          SOURCE_BASE: ../data
        run: node scripts/ranking-sync.js

      # 증분 해시 상태 커밋 — [skip ci] 로 재트리거 방지 (paths 필터로도 걸리지 않음)
      - name: Commit sync state
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add framer-sync/state/
          git commit -m "chore(framer-sync): state $(date -u +%Y-%m-%dT%H:%M:%SZ) [skip ci]" || echo "변경 없음"
          git push

      # 실패 시 GitHub 이슈 알림 — 연속 실패가 묻히는 것 방지.
      # (2026-06-25 API 키 무효화로 일주일간 미동기화가 발견되지 않은 사고 재발 방지.
      #  키 무효화 시 로그에 "API key does not have access to this project" 가 찍힘 →
      #  Framer 사이트 설정 → API 에서 키 재발급 후 FRAMER_API_KEY/FRAMER_PROJECT_URL Secret 갱신)
      # 열려 있는 동일 제목 이슈가 있으면 새로 만들지 않고 댓글로 누적.
      - name: Notify on failure (GitHub issue)
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="framer-sync 실패 — CMS 동기화 중단, 확인 필요"
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          body="워크플로 실행 실패: $run_url

          로그에 \"API key does not have access to this project\" 가 보이면 Framer API 키가 무효화된 것입니다.
          → Framer 사이트 설정 → API 에서 키 재발급 후 레포 Secrets(FRAMER_API_KEY, FRAMER_PROJECT_URL) 갱신."
          existing=$(gh issue list --state open --search "in:title \"$title\"" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body "재실패: $run_url"
          else
            gh issue create --title "$title" --body "$body"
          fi

      # (선택) 실패 시 Slack 알림 — SLACK_WEBHOOK_URL Secret 등록 후 주석 해제
      # - name: Notify on failure (Slack)
      #   if: failure()
      #   run: |
      #     curl -X POST -H 'Content-type: application/json' \
      #       --data '{"text":"⚠️ Framer 동기화 실패: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"}' \
      #       "${{ secrets.SLACK_WEBHOOK_URL }}"
