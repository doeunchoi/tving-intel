<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TVING Contents Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script>
const CONFIG = {
  TMDB_KEY:           'YOUR_TMDB_API_KEY',
  SHEETS_ID:          'YOUR_SPREADSHEET_ID',
  GOOGLE_API_KEY:     'YOUR_GOOGLE_API_KEY',
  ADMIN_PASSWORD:     'tving2026',
  REDASH_BASE:        'https://prod-redash-ext.tving-data.com',
  REDASH_TOP20_QUERY: '1438',
  REDASH_API_KEY:     '8Smmffh6rvxRICbOszmirHZnis82M2PgfMdbbE6W',
};
</script>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --tv:#E51B4A;     --tv-bg:#FEF1F4;   --tv-dark:#B5002D;
  --wv:#1B4FE8;     --wv-bg:#EEF3FE;   --wv-dark:#0D31B5;
  --green:#0D9467;  --green-bg:#EDFBF4;
  --purple:#5E3FCC; --purple-bg:#F0ECFF;
  --amber:#C07800;  --amber-bg:#FFF8EC;
  --bg:#FFFFFF;
  --bg2:#F7F8FA;
  --bg3:#F1F3F6;
  --t1:#0E0E10;
  --t2:#4B4E58;
  --t3:#9399A6;
  --bd:rgba(0,0,0,0.08);
  --bd2:rgba(0,0,0,0.15);
  --r:8px; --rl:12px; --sh:0 1px 3px rgba(0,0,0,0.06),0 4px 12px rgba(0,0,0,0.04);
  --g-drama:#E51B4A;   --g-drama-bg:#FEF1F4;   --g-drama-dark:#8B0020;
  --g-reality:#C07800; --g-reality-bg:#FFF8EC;  --g-reality-dark:#7A4E00;
  --g-survival:#0D9467;--g-survival-bg:#EDFBF4; --g-survival-dark:#075C42;
}

body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Apple SD Gothic Neo",sans-serif;font-size:14px;line-height:1.6;background:var(--bg3);color:var(--t1);min-height:100vh}

.nav{background:#fff;border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:1280px;margin:0 auto;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;}
.logo{font-size:15px;font-weight:600;color:var(--t1)}
.logo em{color:var(--tv);font-style:normal}

.admin-trigger{
  position:fixed;bottom:16px;right:16px;z-index:50;
  width:28px;height:28px;border-radius:50%;
  background:var(--bg2);border:1px solid var(--bd);
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  opacity:0.18;transition:opacity .2s;
}
.admin-trigger:hover{opacity:0.55}

.pw-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:500;align-items:center;justify-content:center}
.pw-overlay.open{display:flex}
.pw-box{background:var(--bg);border-radius:var(--rl);padding:28px 24px;width:320px;box-shadow:0 8px 32px rgba(0,0,0,0.2)}
.pw-inp{width:100%;padding:9px 12px;font-size:13px;border:1px solid var(--bd2);border-radius:var(--r);margin-bottom:10px}

.app{max-width:1280px;margin:0 auto;padding:0 24px 80px}
.page{display:none}.page.active{display:block}

.btn{padding:7px 16px;font-size:13px;border-radius:8px;cursor:pointer;border:1px solid var(--bd2);background:#fff;color:var(--t2);transition:all .15s;font-weight:500}
.btn.on{background:var(--t1);color:var(--bg);border-color:var(--t1)}
.btn.pri{background:var(--purple-bg);color:var(--purple);border-color:var(--purple)}
.btn.suc{background:var(--green-bg);color:var(--green);border-color:var(--green)}

.vtabs{display:flex;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;background:var(--bg2);margin-top:20px;margin-bottom:20px}
.vtab{flex:1;padding:10px;font-size:12px;cursor:pointer;background:transparent;border:none;color:var(--t3);text-align:center;transition:all .15s}
.vtab.on{background:var(--bg);color:var(--t1);font-weight:700}
.vtab-con{display:none}.vtab-con.active{display:block}

.poster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:18px;}
.pcard{background:#fff;border-radius:16px;overflow:hidden;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 1px 4px rgba(0,0,0,0.07)}
.pcard:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.12)}
.poster-wrap{position:relative;width:100%;padding-top:150%;background:var(--bg2)}
.poster-wrap img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}

.pcard-body{padding:11px 13px 13px}
.pcard-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.pbadge{font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px}
.tv-b{background:var(--tv-bg);color:var(--tv-dark)}
.wv-b{background:var(--wv-bg);color:var(--wv-dark)}
.gtag{font-size:10px;color:var(--t3)}
.pc-title{font-size:13px;font-weight:600;line-height:1.35;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pc-date{font-size:10px;color:var(--t3);margin-bottom:7px}
.pc-foot{display:flex;align-items:center;justify-content:flex-end;padding-top:7px;border-top:1px solid var(--bd)}
.peak{font-size:9px;background:var(--amber-bg);color:var(--amber);padding:1px 6px;border-radius:8px}

.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:200;align-items:center;justify-content:center;padding:20px;}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.18)}
.modal-poster{width:100%;padding-top:46%;position:relative;background:var(--bg2)}
.modal-poster img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover}
.modal-body{padding:20px}
.modal-hdr{display:flex;justify-content:space-between;margin-bottom:15px}
.modal-tabs{display:flex;border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;margin-bottom:16px}
.modal-tab{flex:1;padding:8px;font-size:12px;cursor:pointer;background:transparent;border:none;color:var(--t3);text-align:center}
.modal-tab.on{background:var(--bg2);color:var(--t1);font-weight:600}
.mtab-con{display:none}.mtab-con.on{display:block}

.aud-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:12px}
.aud-bar-wrap{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.aud-bar{height:100%;border-radius:4px}

.admin-section{background:#fff;border:1px solid var(--bd);border-radius:12px;padding:18px;margin-bottom:14px}
.asec-title{font-size:13px;font-weight:600;margin-bottom:12px;display:block}
.form-panel{display:none;background:var(--bg2);border-radius:var(--r);padding:14px;margin-top:10px}
.form-panel.open{display:block}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.ff{display:flex;flex-direction:column;gap:3px}
.ff.full{grid-column:1/-1}
.fl{font-size:10px;color:var(--t3)}
.fi{padding:7px 10px;font-size:12px;border:1px solid var(--bd2);border-radius:var(--r);background:var(--bg)}

.dtbl{width:100%;border-collapse:collapse;font-size:12px;margin-top:10px}
.dtbl th{text-align:left;color:var(--t3);padding:10px;border-bottom:1px solid var(--bd)}
.dtbl td{padding:10px;border-bottom:1px solid var(--bd)}

.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--t1);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;opacity:0;transition:opacity .25s;z-index:999}
.toast.show{opacity:1}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <div class="logo">TVING <em>Contents</em> Intelligence</div>
  </div>
</nav>

<button class="admin-trigger" onclick="openPwPrompt()">🔑</button>

<div class="pw-overlay" id="pw-overlay">
  <div class="pw-box">
    <div style="font-weight:600;margin-bottom:10px">관리자 접근</div>
    <input class="pw-inp" id="pw-inp" type="password" placeholder="비밀번호">
    <div id="pw-err" style="color:var(--tv);font-size:11px;display:none;margin-bottom:10px">오류입니다.</div>
    <div style="display:flex;gap:8px;justify-content:flex-end">
      <button class="btn" onclick="closePwPrompt()">취소</button>
      <button class="btn pri" onclick="checkPw()">확인</button>
    </div>
  </div>
</div>

<div class="app">
  <div class="page active" id="viewer-page">
    <div class="vtabs">
      <button class="vtab on" onclick="setTab('home')">📌 추천 · 캘린더</button>
      <button class="vtab" onclick="setTab('ranking')">🏆 TOP 20</button>
      <button class="vtab" onclick="setTab('explorer')">🔍 익스플로러</button>
    </div>

    <div class="vtab-con active" id="vcon-home">
      <div id="reco-grid" class="poster-grid"></div>
    </div>
    <div class="vtab-con" id="vcon-ranking">
      <div id="rank-grid" style="background:#fff;padding:20px;border-radius:16px"></div>
    </div>
    <div class="vtab-con" id="vcon-explorer">
      <div id="poster-grid" class="poster-grid"></div>
    </div>
  </div>

  <div class="page" id="admin-page">
    <div style="display:flex;justify-content:space-between;margin:24px 0">
      <div style="font-size:18px;font-weight:700">관리자 모드</div>
      <button class="btn" onclick="goViewer()">돌아가기</button>
    </div>
    
    <div class="admin-section">
      <span class="asec-title">신규 콘텐츠 등록</span>
      <div style="display:flex;gap:8px">
        <input class="fi" style="flex:1" id="m-title" placeholder="프로그램명을 입력하세요">
        <button class="btn pri" onclick="openManualForm()">직접 입력하기</button>
      </div>
      
      <div class="form-panel" id="manual-panel">
        <div class="form-grid" id="manual-form"></div>
        <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
          <button class="btn" onclick="closeManualForm()">취소</button>
          <button class="btn suc" onclick="saveEntry()">DB 저장</button>
        </div>
      </div>
    </div>

    <div class="admin-section">
      <span class="asec-title">콘텐츠 리스트</span>
      <table class="dtbl">
        <thead><tr><th>플랫폼</th><th>제목</th><th>장르</th><th>썸네일 URL</th><th>작업</th></tr></thead>
        <tbody id="admin-tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="modal-bg" id="modal-bg">
  <div class="modal" id="modal-inner"></div>
</div>

<div class="toast" id="toast"></div>

<script>
let DATA = [
  {id:1,platform:'tving',title:'환승연애 시즌4',genre:'리얼리티',startMonth:4,synopsis:'전 연인들이 모여 새로운 사랑을 찾는 연애 리얼리티',cast:'일반인 출연자',adSlot:'Pre-roll',posterUrl:'',audience:{f:70,m:30,ages:[{l:'18-24',v:40},{l:'25-34',v:45},{l:'35-44',v:10},{l:'45+',v:5}]}},
  {id:2,platform:'tving',title:'2026 KBO 리그',genre:'스포츠',startMonth:3,synopsis:'티빙 독점 생중계 프로야구',cast:'-',adSlot:'중간광고',posterUrl:'',audience:{f:30,m:70,ages:[{l:'18-24',v:15},{l:'25-34',v:30},{l:'35-44',v:35},{l:'45+',v:20}]}}
];

let nextId = 3;

function setTab(t){
  document.querySelectorAll('.vtab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.vtab-con').forEach(c=>c.classList.remove('active'));
  event.target.classList.add('on');
  document.getElementById('vcon-'+t).classList.add('active');
  renderAll();
}

function renderAll(){
  const grid = document.getElementById('poster-grid');
  grid.innerHTML = DATA.map(d=>`
    <div class="pcard" onclick="openModal(${d.id})">
      <div class="poster-wrap" id="pw-${d.id}"></div>
      <div class="pcard-body">
        <div class="pcard-top"><span class="pbadge ${d.platform}-b">${d.platform.toUpperCase()}</span><span class="gtag">${d.genre}</span></div>
        <div class="pc-title">${d.title}</div>
        <div class="pc-date">${d.startMonth}월 공개</div>
        <div class="pc-foot">${d.id===1?'<span class="peak">TOP 20</span>':''}</div>
      </div>
    </div>
  `).join('');
  DATA.forEach(d=>injectPoster('pw-'+d.id, d.title, d.posterUrl));
}

function openModal(id){
  const d = DATA.find(x=>x.id===id);
  const aud = d.audience || {f:50,m:50,ages:[{l:'18-24',v:25},{l:'25-34',v:25},{l:'35-44',v:25},{l:'45+',v:25}]};
  
  document.getElementById('modal-inner').innerHTML = `
    <div class="modal-poster" id="mp-${d.id}"></div>
    <div class="modal-body">
      <div class="modal-hdr">
        <div style="font-size:18px;font-weight:700">${d.title}</div>
        <button onclick="closeModal()" style="border:none;background:none;cursor:pointer">✕</button>
      </div>
      
      <div class="modal-tabs">
        <button class="modal-tab on" onclick="switchMTab(this, 'm-info')">상세 정보</button>
        <button class="modal-tab" onclick="switchMTab(this, 'm-aud')">타겟 오디언스</button>
      </div>

      <div class="mtab-con on" id="m-info">
        <div style="font-size:13px;line-height:1.6;margin-bottom:15px">${d.synopsis}</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="background:var(--bg2);padding:10px;border-radius:8px"><div style="font-size:10px;color:var(--t3)">출연</div><div style="font-size:12px">${d.cast}</div></div>
          <div style="background:var(--bg2);padding:10px;border-radius:8px"><div style="font-size:10px;color:var(--t3)">광고상품</div><div style="font-size:12px">${d.adSlot}</div></div>
        </div>
      </div>

      <div class="mtab-con" id="m-aud">
        <div style="font-weight:600;font-size:13px;margin-bottom:10px">성별 분포</div>
        <div style="display:flex;gap:10px;margin-bottom:20px">
          <div style="flex:1;text-align:center;padding:10px;background:#FDE8ED;border-radius:8px"><div style="color:#E51B4A;font-weight:700">${aud.f}%</div><div style="font-size:10px">여성</div></div>
          <div style="flex:1;text-align:center;padding:10px;background:#EEF3FE;border-radius:8px"><div style="color:#1B4FE8;font-weight:700">${aud.m}%</div><div style="font-size:10px">남성</div></div>
        </div>
        <div style="font-weight:600;font-size:13px;margin-bottom:10px">연령별 시청 비중</div>
        ${aud.ages.map(a=>`
          <div class="aud-row">
            <span style="width:50px;color:var(--t3)">${a.l}</span>
            <div class="aud-bar-wrap"><div class="aud-bar" style="width:${a.v}%;background:var(--tv)"></div></div>
            <span style="width:30px;text-align:right;font-weight:600">${a.v}%</span>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  document.getElementById('modal-bg').classList.add('open');
  injectPoster('mp-'+d.id, d.title, d.posterUrl);
}

function switchMTab(btn, target){
  document.querySelectorAll('.modal-tab').forEach(b=>b.classList.remove('on'));
  document.querySelectorAll('.mtab-con').forEach(c=>c.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(target).classList.add('on');
}

function openManualForm(){
  const title = document.getElementById('m-title').value;
  if(!title){ alert('제목을 입력하세요'); return; }
  document.getElementById('manual-form').innerHTML = `
    <div class="ff full"><span class="fl">프로그램명</span><input class="fi" id="f-title" value="${title}"></div>
    <div class="ff"><span class="fl">플랫폼</span><select class="fi" id="f-plat"><option value="tving">TVING</option><option value="wavve">Wavve</option></select></div>
    <div class="ff"><span class="fl">장르</span><select class="fi" id="f-genre"><option>드라마</option><option>리얼리티</option><option>스포츠</option><option>예능</option></select></div>
    <div class="ff"><span class="fl">방영월</span><input class="fi" type="number" id="f-month" value="1"></div>
    <div class="ff"><span class="fl">광고상품</span><input class="fi" id="f-ad" value="Pre-roll"></div>
    <div class="ff full"><span class="fl">시놉시스</span><input class="fi" id="f-syn"></div>
    <div class="ff full"><span class="fl">썸네일 이미지 URL (이미지 주소 복사하여 붙여넣기)</span><input class="fi" id="f-poster" placeholder="https://..."></div>
  `;
  document.getElementById('manual-panel').classList.add('open');
}

function saveEntry(){
  const entry = {
    id: nextId++,
    title: document.getElementById('f-title').value,
    platform: document.getElementById('f-plat').value,
    genre: document.getElementById('f-genre').value,
    startMonth: document.getElementById('f-month').value,
    adSlot: document.getElementById('f-ad').value,
    synopsis: document.getElementById('f-syn').value,
    posterUrl: document.getElementById('f-poster').value,
    cast: '정보 없음',
    audience: {f:52,m:48,ages:[{l:'18-24',v:20},{l:'25-34',v:35},{l:'35-44',v:25},{l:'45+',v:20}]}
  };
  DATA.push(entry);
  renderAdmin();
  closeManualForm();
  toast('성공적으로 저장되었습니다.');
}

function renderAdmin(){
  document.getElementById('admin-tbody').innerHTML = DATA.map(d=>`
    <tr>
      <td>${d.platform}</td>
      <td style="font-weight:600">${d.title}</td>
      <td>${d.genre}</td>
      <td><input class="fi" style="width:150px" value="${d.posterUrl}" readonly></td>
      <td><button class="btn" style="color:var(--tv)" onclick="deleteEntry(${d.id})">삭제</button></td>
    </tr>
  `).join('');
}

function openPwPrompt(){ document.getElementById('pw-overlay').classList.add('open'); }
function closePwPrompt(){ document.getElementById('pw-overlay').classList.remove('open'); }
function checkPw(){
  if(document.getElementById('pw-inp').value === CONFIG.ADMIN_PASSWORD){
    goAdmin(); closePwPrompt();
  } else { document.getElementById('pw-err').style.display='block'; }
}

function goAdmin(){
  document.getElementById('viewer-page').classList.remove('active');
  document.getElementById('admin-page').classList.add('active');
  renderAdmin();
}
function goViewer(){
  document.getElementById('admin-page').classList.remove('active');
  document.getElementById('viewer-page').classList.add('active');
  renderAll();
}

function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); }
function closeManualForm(){ document.getElementById('manual-panel').classList.remove('open'); }

function toast(m){
  const t = document.getElementById('toast');
  t.textContent = m; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

function injectPoster(id, title, url){
  const el = document.getElementById(id);
  if(!el) return;
  if(url) el.innerHTML = `<img src="${url}">`;
  else el.style.background = '#eee';
}

renderAll();
</script>
</body>
</html>
